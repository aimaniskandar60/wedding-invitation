<!DOCTYPE html>
<html lang="en">
	<head>
		<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora&display=swap" rel="stylesheet">
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Azzalea & Aiman's Wedding</title>
		<link rel="stylesheet" href="style.css?v=20260407c">
	</head>

	<body>

		<header class="hero">
			<p class="hero-kicker">السَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللهِ وَبَرَكَاتُهُ</p>
			<p class="hero-kicker">Walimatul Urus</p>
			<h1 class="cursive-text hero-names">Azzalea & Aiman</h1>
			<p class="hero-date">Expected Date: TBD</p>
			<a class="hero-rsvp-btn" href="#rsvp">RSVP</a>
		</header>

		<section class="content-section">
			<h2>Our Story</h2>
			<p>Write your love story here...</p>
		</section>

		<section class="content-section">
			<h2>Event Details</h2>
			<p>Reception: TBD</p>
			<p>Venue: TBD</p>
		</section>

		<section class="content-section" id="rsvp">
			<h2>RSVP</h2>
			<p>Please fill in your details below.</p>
			<form
				class="rsvp-form"
				action="https://docs.google.com/forms/d/e/1FAIpQLSeR3HBybhHd82gmI8Add4NJ5ksYuSUnwPH_Y5ooAVdN47G1vQ/formResponse"
				method="POST"
				target="hidden_iframe"
			>

				<!-- Google Forms form link:
					name: entry.1498135098
					attendance: entry.877086558
					pax: entry.2606285
					phone number: entry.282845420
					notes: entry.682894428
				-->
				<label for="guest-name">Name</label>
				<input
					id="guest-name"
					name="entry.1498135098"
					type="text"
					required
					placeholder="Your name"
				>

				<fieldset>
					<legend>Will you attend?</legend>
					<div class="radio-row">
						<label>
							<input type="radio" name="entry.877086558" value="Yes" required>
							Yes
						</label>
						<label>
							<input type="radio" name="entry.877086558" value="No" required>
							No
						</label>
					</div>
				</fieldset>
			
				<div id="phone-number-group">
					<label for="phone-number">Phone Number</label>
					<input
						id="phone-number"
						name="entry.282845420"
						type="tel"
						pattern="^(?:01[0-9]\d{7,8}|\+601[0-9]\d{7,8}|601[0-9]\d{7,8})$"
					>
				</div>

				<div id="pax-group" hidden>
					<label for="pax">Number of Pax</label>
					<input
						id="pax"
						name="entry.2606285"
						type="number"
						min="1"
						max="10"
						placeholder="e.g. 2"
					>
				</div>

				<label for="notes">Leave your best wishes</label>
				<textarea
					id="notes"
					name="entry.682894428"
					rows="4"
				></textarea>

				<button type="submit">Submit RSVP</button>
			</form>

			<iframe name="hidden_iframe" title="Hidden RSVP Submit Frame" class="hidden-frame"></iframe>

		</section>

		<script>
			const rsvpForm = document.querySelector('.rsvp-form');
			const hiddenFrame = document.querySelector('iframe[name="hidden_iframe"]');
			const attendanceInputs = document.querySelectorAll('input[name="entry.877086558"]');
			const paxGroup = document.getElementById('pax-group');
			const paxInput = document.getElementById('pax');
			const phoneNumberGroup = document.getElementById('phone-number-group');
			const phoneNumberInput = document.getElementById('phone-number');
			let hasSubmitted = false;

			function togglePaxAndNumberField() {
				const selected = document.querySelector('input[name="entry.877086558"]:checked');
				const isAttending = selected && selected.value === 'Yes';

				// Show pax input if attending, hide otherwise. Also make it required if attending.
				paxGroup.hidden = !isAttending;
				paxInput.required = isAttending;

				// Show phone number input if attending, hide otherwise. Also make it required if attending.
				phoneNumberGroup.hidden = !isAttending;
				phoneNumberInput.required = isAttending;

				if (!isAttending) {
					paxInput.value = '';
					phoneNumberInput.value = '';
				}
			}

			attendanceInputs.forEach((input) => {
				input.addEventListener('change', togglePaxAndNumberField);
			});

			rsvpForm.addEventListener('submit', () => {
				hasSubmitted = true;
			});

			hiddenFrame.addEventListener('load', () => {
				if (!hasSubmitted) {
					return;
				}

				const selected = document.querySelector('input[name="entry.877086558"]:checked');
				const rsvp = selected && selected.value === 'Yes' ? 'yes' : 'no';
				window.location.href = 'thank-you.html?rsvp=' + rsvp;
			});

			togglePaxAndNumberField();
		</script>

	</body>
</html>
