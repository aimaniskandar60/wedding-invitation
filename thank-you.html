<!DOCTYPE html>
<html lang="en">
	<head>
		<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Thank You | Aiman & Azzalea</title>
		<link rel="stylesheet" href="style.css">
	</head>

	<body>
		<!-- TODO: Have the messages be different based on RSVP response -->
		<main class="thank-you-page">
			<section class="thank-you-card">
				<h1 class="cursive-text">Thank You</h1>
				<p id="rsvp-message"></p>
			</section>
		</main>
		<script>
			const params = new URLSearchParams(window.location.search);
			const rsvp = params.get('rsvp');
			const messageEl = document.getElementById('rsvp-message');

			if (rsvp === 'yes') {
				messageEl.textContent = 'Your RSVP has been received. We are so excited to celebrate with you!';
			} else {
				messageEl.textContent = 'Your RSVP has been received. We will miss you, but thank you for letting us know!';
			}
		</script>
	</body>
</html>
